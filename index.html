<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retirement Planner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/recharts@2.15.0/umd/Recharts.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { background: #0f172a; margin: 0; }
    #loading { display:flex; flex-direction:column; justify-content:center; align-items:center; height:100vh; color:#94a3b8; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; }
    .spinner { width:40px; height:40px; border:3px solid #334155; border-top-color:#3b82f6; border-radius:50%; animation:spin .8s linear infinite; margin-bottom:16px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .status { font-size:.85rem; margin-top:8px; color:#64748b; }
    #error-display { display:none; max-width:700px; margin:60px auto; padding:24px; background:#1e293b; border:1px solid #ef4444; border-radius:12px; color:#fca5a5; font-family:monospace; font-size:.85rem; white-space:pre-wrap; word-break:break-all; }
  </style>
</head>
<body>
  <div id="root">
    <div id="loading">
      <div class="spinner"></div>
      <div style="font-size:1.1rem">Loading Retirement Planner...</div>
      <div class="status" id="load-status">Loading libraries...</div>
    </div>
  </div>
  <div id="error-display"></div>

  <script>
    function showError(msg) {
      document.getElementById('error-display').style.display = 'block';
      document.getElementById('error-display').textContent = msg;
      document.getElementById('loading').style.display = 'none';
    }

    (async function() {
      try {
        // Step 1: Fetch the JSX source
        document.getElementById('load-status').textContent = 'Fetching app code...';
        const resp = await fetch('retirement-planner-v20.jsx');
        if (!resp.ok) throw new Error('Failed to load JSX file: ' + resp.status);
        const jsxSource = await resp.text();

        // Step 2: Transform JSX to JS using Babel
        document.getElementById('load-status').textContent = 'Compiling JSX...';
        const transformed = Babel.transform(jsxSource, {
          presets: ['react'],
          filename: 'retirement-planner-v20.jsx'
        });

        // Step 3: Execute in global scope with all dependencies available
        document.getElementById('load-status').textContent = 'Initializing app...';
        
        // Make React hooks and Recharts components available as globals
        const setupGlobals = `
          var useState = React.useState;
          var useMemo = React.useMemo;
          var useEffect = React.useEffect;
          var useCallback = React.useCallback;
          var memo = React.memo;
          var LineChart = Recharts.LineChart;
          var Line = Recharts.Line;
          var BarChart = Recharts.BarChart;
          var Bar = Recharts.Bar;
          var XAxis = Recharts.XAxis;
          var YAxis = Recharts.YAxis;
          var CartesianGrid = Recharts.CartesianGrid;
          var Tooltip = Recharts.Tooltip;
          var Legend = Recharts.Legend;
          var ResponsiveContainer = Recharts.ResponsiveContainer;
          var ComposedChart = Recharts.ComposedChart;
          var Area = Recharts.Area;
          var ReferenceLine = Recharts.ReferenceLine;
        `;

        // Strip the const destructuring lines from the transformed code
        // (we're providing them as var globals above)
        let code = transformed.code;
        code = code.replace(/^.*useState.*useMemo.*useEffect.*=\s*React;?\s*$/m, '');
        code = code.replace(/^.*LineChart.*BarChart.*=\s*Recharts;?\s*$/m, '');

        // Execute everything together in global scope using indirect eval
        const fullCode = setupGlobals + '\n' + code;
        (0, eval)(fullCode);

        // Step 4: Render
        document.getElementById('load-status').textContent = 'Rendering...';
        var root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(RetirementPlanner));

      } catch (err) {
        showError('Error loading app:\n\n' + err.message + '\n\n' + (err.stack || ''));
      }
    })();
  </script>
</body>
</html>
