<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retirement Planner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React 18 + required peer deps for Recharts UMD -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-is@18/umd/react-is.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
  <!-- Recharts UMD - pinned to 2.10.3 (known working UMD build) -->
  <script crossorigin src="https://unpkg.com/recharts@2.10.3/umd/Recharts.js"></script>
  <!-- Babel for in-browser JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { background: #0f172a; margin: 0; }
    #loading { display:flex; flex-direction:column; justify-content:center; align-items:center; height:100vh; color:#94a3b8; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; }
    .spinner { width:40px; height:40px; border:3px solid #334155; border-top-color:#3b82f6; border-radius:50%; animation:spin .8s linear infinite; margin-bottom:16px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .status { font-size:.85rem; margin-top:8px; color:#64748b; }
    #error-display { display:none; max-width:700px; margin:60px auto; padding:24px; background:#1e293b; border:1px solid #ef4444; border-radius:12px; color:#fca5a5; font-family:monospace; font-size:.85rem; white-space:pre-wrap; word-break:break-all; }
  </style>
</head>
<body>
  <div id="root">
    <div id="loading">
      <div class="spinner"></div>
      <div style="font-size:1.1rem">Loading Retirement Planner...</div>
      <div class="status" id="load-status">Loading libraries...</div>
    </div>
  </div>
  <div id="error-display"></div>

  <script>
    function showError(msg) {
      document.getElementById('error-display').style.display = 'block';
      document.getElementById('error-display').textContent = msg;
      document.getElementById('loading').style.display = 'none';
    }

    // Verify all libraries loaded before proceeding
    var missing = [];
    if (typeof React === 'undefined') missing.push('React');
    if (typeof ReactDOM === 'undefined') missing.push('ReactDOM');
    if (typeof Recharts === 'undefined') missing.push('Recharts');
    if (typeof Babel === 'undefined') missing.push('Babel');
    
    if (missing.length > 0) {
      showError('Failed to load: ' + missing.join(', ') + '\n\nCheck browser console (F12) for blocked scripts or network errors.');
    } else {

    (async function() {
      try {
        document.getElementById('load-status').textContent = 'Fetching app code...';
        var resp = await fetch('retirement-planner-v20.jsx');
        if (!resp.ok) throw new Error('Failed to load retirement-planner-v20.jsx: HTTP ' + resp.status);
        var jsxSource = await resp.text();

        document.getElementById('load-status').textContent = 'Compiling (' + Math.round(jsxSource.length/1024) + ' KB)...';
        var transformed = Babel.transform(jsxSource, { presets: ['react'] });

        document.getElementById('load-status').textContent = 'Initializing...';

        // Provide React hooks and Recharts components as var globals (hoisted)
        var globals = 'var useState=React.useState,useMemo=React.useMemo,useEffect=React.useEffect,useCallback=React.useCallback,memo=React.memo;'
          + 'var LineChart=Recharts.LineChart,Line=Recharts.Line,BarChart=Recharts.BarChart,Bar=Recharts.Bar,'
          + 'XAxis=Recharts.XAxis,YAxis=Recharts.YAxis,CartesianGrid=Recharts.CartesianGrid,'
          + 'Tooltip=Recharts.Tooltip,Legend=Recharts.Legend,ResponsiveContainer=Recharts.ResponsiveContainer,'
          + 'ComposedChart=Recharts.ComposedChart,Area=Recharts.Area,ReferenceLine=Recharts.ReferenceLine;';

        // Strip any const destructuring of React/Recharts from compiled code
        var code = transformed.code;
        code = code.replace(/^.*useState.*useMemo.*useEffect.*=\s*React;?\s*$/m, '');
        code = code.replace(/^.*LineChart.*BarChart.*=\s*Recharts;?\s*$/m, '');

        // Execute in global scope
        (0, eval)(globals + '\n' + code);

        document.getElementById('load-status').textContent = 'Rendering...';
        var root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(RetirementPlanner));

      } catch (err) {
        showError('Error loading app:\n\n' + err.message + '\n\n' + (err.stack || ''));
      }
    })();

    } // end library check
  </script>
</body>
</html>
